
<div id="layout-content" class="cartorio">
    <!-- Barra topo -->
    <div class="barra-topo">
        <span class="nome-empresa" id="nome-empresa-painel">CARTÓRIO DE REGISTRO CIVIL</span>
    </div>

    <div class="corpo">
        <!-- Coluna esquerda -->
        <div class="col-esquerda">
            <div class="bloco-label">Senha</div>
            <div class="bloco-senha blink">
                <span>{{ ultima.texto }}</span>
            </div>

            <div class="bloco-label">Guichê</div>
            <div class="bloco-guiche blink">
                <span>{{ ultima.numeroLocal }}</span>
            </div>

            <div class="bloco-servico {{ ultima.styleClass }}">
                <span>{{ ultima.servico || ultima.mensagem }}</span>
            </div>

            <div class="bloco-relogio">
                <div class="hora">
                    <span id="cart-h">00</span><span class="sep"> : </span><span id="cart-m">00</span><span class="sep"> : </span><span id="cart-s">00</span>
                </div>
                <div class="data" id="cart-data-ext"></div>
            </div>
        </div>

        <!-- Coluna direita -->
        <div class="col-direita">
            <div id="media-container">
                <div id="media"></div>
            </div>

            <!-- Se tem nome do cliente, mostra. Senão, mostra histórico -->
            <div class="bloco-inferior">
                <div class="bloco-cliente" id="area-cliente" style="display:none">
                    <span class="label-cliente">Cliente:</span>
                    <span class="nome-cliente" id="nome-cliente-valor"></span>
                </div>
                <div class="bloco-historico" id="area-historico">
                    <div class="hist-titulo">Últimas senhas chamadas</div>
                    <div class="hist-lista">
                        <div class="hist-item {{ senha.styleClass }}" ng-repeat="senha in historico | limitTo: 5">
                            <span class="hist-senha">{{ senha.texto }}</span>
                            <span class="hist-local">{{ senha.local }} {{ senha.numeroLocal }}</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Notícias rodapé -->
    <div id="news" class="rodape-news">
        <div class="panel-heading"><span class="pull-right text-muted"></span></div>
        <div class="panel-body"></div>
    </div>
</div>
